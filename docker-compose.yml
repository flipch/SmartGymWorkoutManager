# SmartGymWorkoutManager — flipch fork (homelab deploy)
# Two services from one image: the Flask web UI (5001) and the MCP server (5002).
# A shared named volume mounted at /data (DATA_DIR) holds config.json — the
# logged-in user's Speediance token — plus the cached exercise library, so
# logging in via the web UI immediately authenticates the MCP too.
services:
  smart-gym-app:
    build: .
    image: smart-gym:flipch
    container_name: smart_gym_app
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - PYTHONUNBUFFERED=1
      - DATA_DIR=/data
      - TZ=${TZ:-America/Edmonton}
    volumes:
      - gym-data:/data
    command: ["gunicorn", "-w", "1", "-b", "0.0.0.0:5001", "--timeout", "120", "app:app"]

  smart-gym-mcp:
    build: .
    image: smart-gym:flipch
    container_name: smart_gym_mcp
    restart: unless-stopped
    ports:
      - "5002:5002"
    environment:
      - PYTHONUNBUFFERED=1
      - DATA_DIR=/data
      - MCP_HOST=0.0.0.0
      - MCP_PORT=5002
      - TZ=${TZ:-America/Edmonton}
    volumes:
      - gym-data:/data
    depends_on:
      - smart-gym-app
    command: ["python", "mcp_server.py"]
    # override the image healthcheck (which probes the Flask port 5001):
    # this service serves the MCP on 5002, so check that instead.
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1', 5002), 3).close()"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  gym-data:
